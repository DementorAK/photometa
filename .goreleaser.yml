project_name: photometa

version: 2

before:
  hooks:
    - go mod download

builds:
  - id: photometa-cli
    main: ./cmd/photometa
    binary: photometa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/DementorAK/photometa/internal/platform/version.Version={{ .Version }}
      - -X github.com/DementorAK/photometa/internal/platform/version.Commit={{ .Commit }}
      - -X github.com/DementorAK/photometa/internal/platform/version.Date={{ .Date }}

  - id: photometa-gui
    main: ./cmd/photometa
    binary: photometa_gui
    env:
      - CGO_ENABLED=1
      - "CC={{ if eq .Os \"windows\" }}x86_64-w64-mingw32-gcc{{ else }}gcc{{ end }}"
    goos:
      - linux
      - windows
    goarch:
      - amd64
    flags:
      - -tags=gui
    ldflags:
      - -s -w
      - -X github.com/DementorAK/photometa/internal/platform/version.Version={{ .Version }}
      - -X github.com/DementorAK/photometa/internal/platform/version.Commit={{ .Commit }}
      - -X github.com/DementorAK/photometa/internal/platform/version.Date={{ .Date }}

archives:
  - id: cli
    ids:
      - photometa-cli
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
  - id: gui
    ids:
      - photometa-gui
    name_template: "{{ .ProjectName }}_gui_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
