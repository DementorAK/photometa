project_name: photometa

version: 2

before:
  hooks:
    - go mod download

builds:
  - id: photometa
    main: ./cmd/photometa
    binary: photometa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/DementorAK/photometa/internal/platform/version.Version={{ .Version }}
      - -X github.com/DementorAK/photometa/internal/platform/version.Commit={{ .Commit }}
      - -X github.com/DementorAK/photometa/internal/platform/version.Date={{ .Date }}

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ chore:'
